name: Release

on:
  release:
    types: released

jobs:
  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Build
        run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  plugin_dst:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.12
        run: uv python install 3.12
        # Cannot be editable install
      # so that .dist-info will go the package instead of .egg-info
      - run: |
          uv sync --no-editable --only-dev
      - run: |
          qgis-plugin-dev-tools build
      - run: |
          qgis-plugin-dev-tools publish dist/*.zip
        env:
          QPDT_PUBLISH_USERNAME: ${{ secrets.QGIS_REPO_USERNAME }}
          QPDT_PUBLISH_PASSWORD: ${{ secrets.QGIS_REPO_PASSWORD }}
      - uses: svenstaro/upload-release-action@2.9.0
        with:
          file: dist/*
          file_glob: true
