[tool.ruff]

line-length = 88
target-version = "py39"

lint.external = ["QGS"]

lint.unfixable = [
    "F401", # Unused imports
    "F841", # Unused variables
]

# List of all rules https://docs.astral.sh/ruff/rules/
lint.select = [
    "ANN", # flake8-annotations
    "B", # flake8-bugbear
    "C", # flake8-comprehensions
    "C90", # flake8, mccabe
    "E", # flake8, pycodestyle
    "F", # flake8, Pyflakes
    "I", # isort
    "N", # pep8-naming
    "INP", # flake8-no-pep420
    "PIE", # flake8-pie
    "PGH", # pygrep-hooks
    "PL", # pylint
    "PT", # flake8-pytest-style
    "RUF", # Ruff-specific rules
    "SIM", # flake8-simplify
    "T", # flake8-print
    "ICN", # flake8-import-conventions
    "TCH", # flake8-type-checking
    "TID", # flake8-tidy-imports
    "W", # flake8, pycodestyle
    "UP", # pyupgrade
    ]


[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.per-file-ignores]
"test*" = [
    "INP001",
    "ANN201",
    "ANN202",
	"ANN001",
	"ANN002",
    "E501",
    "PLR2004", # Magic value used in comparison, consider replacing {value} with a constant variable
    "PLR0913", # Too many arguments to function call (len(args) > 5)
    ]
".github/*.py" = ["ALL"]


[tool.flake8]
max-line-length = 88
spellcheck-targets = "names"
dictionaries = "en_US,python,technical"
extend-ignore = [
    "E203",  # whitespace before ':'
    "E501",  # line length (checked by ruff now, possible mismatches)
    "QGS201", # Experimental return value check
    "QGS202", # Experminetal return value check
]
per-file-ignores = [
    "test/*:INP001,QGS105",
]

[tool.qgis_plugin_dev_tools]
plugin_package_name = "pickLayer"
runtime_requires = [
	"qgis_plugin_tools"
]
version_number_source = "distribution"
